# ============================================================
# Quick Debug Config — 1K subset, 1 epoch
# ============================================================
# Usage:  python run_pipeline.py --config configs/sample_run.yaml
# ============================================================

# Inherit everything from default.yaml via the _base_ key.
# The pipeline loader merges this on top of default.yaml.
_base_: "default.yaml"

pipeline:
  stages:
    - ingestion
    - validation
    - preprocessing
    - training
    - evaluation
  seed: 42

ingestion:
  source: "local"
  local:
    data_dir: "./finetuning_data"
    csv_path: null
  # Limit to 1000 rows for quick debugging
  sample_size: 1000

training:
  num_epochs: 1
  per_device_train_batch_size: 4
  per_device_eval_batch_size: 2
  gradient_accumulation_steps: 4
  eval_strategy: "epoch"
  eval_steps: null
  save_strategy: "epoch"
  save_steps: null
  save_total_limit: 1
  logging_steps: 10
  output_dir: "./checkpoints-debug"
  final_model_dir: "./indictrans2-debug-final"

tracking:
  run_name: "indictrans2-debug-run"

versioning:
  enabled: false
